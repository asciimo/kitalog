services:
  backend:
    build:
      context: .
      target: backend
    ports:
      - "3000:3000"
    volumes:
      - ./server.js:/app/server.js
      - ./routes:/app/routes
      - ./utils:/app/utils
      - ./data:/app/data
    env_file: .env
    environment:
      HOST: 0.0.0.0

  frontend:
    build:
      context: .
      target: frontend
    ports:
      - "5173:5173"
    volumes:
      - ./src:/app/src
      - ./index.html:/app/index.html
      - ./vite.config.js:/app/vite.config.js
    env_file: .env
    environment:
      VITE_BACKEND_URL: http://backend:3000
    depends_on:
      - backend

  test:
    build:
      context: .
      target: backend
    volumes:
      - ./utils:/app/utils
      - ./tests:/app/tests
    command: npm test
    profiles: ["test"]
