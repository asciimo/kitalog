services:
  backend:
    build:
      context: .
      target: backend
    ports:
      - "3000:3000"
    volumes:
      - ./backend:/app/backend
      - ./data:/app/data
    env_file: .env
    environment:
      HOST: 0.0.0.0

  frontend:
    build:
      context: .
      target: frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app/frontend
      - ./vite.config.js:/app/vite.config.js
    env_file: .env
    environment:
      VITE_BACKEND_URL: http://backend:3000
    depends_on:
      - backend

  test:
    build:
      context: .
      target: backend
    volumes:
      - ./backend:/app/backend
      - ./tests:/app/tests
    command: npm test
    profiles: ["test"]
